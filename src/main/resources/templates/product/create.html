<!DOCTYPE html>
<html lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h2>Add Product</h2>
        <form th:action="@{/products/create}" th:object="${product}" method="post" enctype="multipart/form-data" class="form">

        <div class="form-group mb-3">
            <label for="name">Name</label>
            <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Product Name" required>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="form-group mb-3">
            <label for="imageProduct">Image</label>
            <input class="form-control" type="file" id="imageProduct" name="imageProduct" accept="image/png,image/jpeg">
            <div class="form-text">Optional. Upload PNG or JPEG. Leave empty to skip.</div>
        </div>

        <div class="form-group mb-3">
            <label for="price">Price</label>
            <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="Price" step="0.01" required>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="form-group mb-3">
            <label for="category">Category</label>
            <select th:field="*{category.id}" class="form-control" id="category" required>
            <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Add Product</button>
        </form>
</div>
</body>
</html>
