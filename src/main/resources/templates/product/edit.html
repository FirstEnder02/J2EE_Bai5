<html lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Edit product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0 fw-bold"><i class="bi bi-pencil-square me-2"></i>Edit Product</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/products/edit}" th:object="${product}" method="post" enctype="multipart/form-data" class="needs-validation" novalidate>
                        <input type="hidden" th:field="*{id}" />
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Product Name</label>
                            <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Enter product name" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="price" class="form-label fw-semibold">Price</label>
                            <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input class="form-control" type="number" step="0.01" th:field="*{price}" id="price" placeholder="0.00" required>
                            </div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="category" class="form-label fw-semibold">Category</label>
                            <select th:field="*{category.id}" class="form-select" id="category" required>
                            <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                            </select>
                        </div>
                        </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
