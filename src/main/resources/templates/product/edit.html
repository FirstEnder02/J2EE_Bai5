<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <div layout:fragment="content"></div>
    <meta charset="UTF-8">
    <title>Edit product</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0 fw-bold"><i class="bi bi-pencil-square me-2"></i>Edit Product</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/products/edit}" th:object="${product}"
                          method="post" class="needs-validation" enctype="multipart/form-data" novalidate>
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Product Name</label>
                            <input class="form-control" type="text" th:field="*{name}"
                                   id="name" placeholder="Enter product name" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label fw-semibold">Price</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input class="form-control" type="number" step="0.01" th:field="*{price}"
                                           id="price" placeholder="0.00" required>
                                </div>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="category" class="form-label fw-semibold">Category</label>
                                <select th:field="*{category.id}" class="form-select" id="category" required>
                                    <option th:each="category : ${categories}"
                                            th:value="${category.id}" th:text="${category.name}"></option>
                                </select>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold d-block">Current Image</label>
                            <div class="p-2 border rounded bg-light mb-3 text-center" style="max-height: 200px; overflow: hidden;">
                                <img th:if="${product.image != null}" th:src="@{/images/{img}(img=${product.image})}" 
                                     class="img-fluid rounded" style="max-height: 180px;" alt="Product image"/>
                                <div th:if="${product.image == null}" class="py-4">
                                    <i class="bi bi-image text-muted fs-1"></i>
                                    <p class="text-muted mb-0">No image uploaded</p>
                                </div>
                            </div>
                            
                            <label for="image" class="form-label fw-semibold">Change Image</label>
                            <input class="form-control" type="file" id="image" name="imageProduct"
                                   accept="image/png,image/jpeg">
                            <div class="form-text">Leave empty to keep the current image.</div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a th:href="@{/products}" class="btn btn-outline-secondary px-4 me-md-2">Cancel</a>
                            <button type="submit" class="btn btn-primary px-5 shadow-sm">
                                <i class="bi bi-save me-2"></i>Update Product
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
