<!DOCTYPE html>
<html lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Book List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div layout:fragment="content">
    <div class="container body-content">
        <a th:href="@{/Books/create}" class="btn btn-primary mb-3">Create New Book</a>
        <table class="table table-striped">
            <thead>
            <tr>
                <th scope="col">Id</th>
                <th scope="col">Name</th>
                <th scope="col">Image</th>
                <th scope="col">Price</th>
                <th scope="col">Category Name</th>
                <th scope="col">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="Book : ${Books}">
                <th scope="row" th:text="${Book.id}"></th>
                <td th:text="${Book.name}"></td>
                <td><img height="120" width="150" th:src="${Book.image}" alt="Book Image" class="img-thumbnail"></td>
                <td th:text="${Book.price}"></td>
                <td th:text="${Book.category != null ? Book.category.name : ''}"></td>
                <td>
                    <a th:href="@{/Books/edit/{id}(id=${Book.id})}" class="btn btn-secondary btn-sm">Edit</a>
                    <form th:action="@{/Books/delete/{id}(id=${Book.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
